<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenHook 🪝 - Webhook Debugger</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --bg: #0a0a0f;
      --bg2: #12121a;
      --bg3: #1a1a25;
      --border: #2a2a3a;
      --text: #e0e0e8;
      --text2: #8888a0;
      --accent: #6366f1;
      --accent2: #818cf8;
      --success: #22c55e;
      --error: #ef4444;
      --warning: #f59e0b;
    }
    
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }
    
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    
    header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 20px 0;
      margin-bottom: 30px;
    }
    
    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
    }
    
    h1 { font-size: 1.8rem; color: var(--accent2); }
    h1 span { color: var(--text2); }
    
    .auth-section { display: flex; gap: 10px; align-items: center; }
    
    input, select, textarea, button {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
    }
    
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    
    button {
      background: var(--accent);
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }
    
    button:hover { background: var(--accent2); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    
    button.secondary {
      background: var(--bg3);
      border: 1px solid var(--border);
    }
    
    button.danger { background: var(--error); }
    button.success { background: var(--success); }
    button.small { padding: 6px 12px; font-size: 12px; }
    
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
    }
    
    .card h2 {
      font-size: 1.1rem;
      margin-bottom: 16px;
      color: var(--accent2);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .endpoint-box {
      background: var(--bg);
      border: 2px solid var(--accent);
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      margin-bottom: 20px;
    }
    
    .endpoint-box .label {
      color: var(--text2);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    
    .endpoint-box .url {
      font-family: monospace;
      font-size: 1.1rem;
      color: var(--success);
      word-break: break-all;
    }
    
    .endpoint-box .actions {
      margin-top: 15px;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
    
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
    }
    
    .tab {
      padding: 8px 16px;
      background: transparent;
      color: var(--text2);
      border-radius: 6px 6px 0 0;
      position: relative;
    }
    
    .tab.active {
      background: var(--bg2);
      color: var(--accent2);
    }
    
    .webhook-list { display: flex; flex-direction: column; gap: 12px; }
    
    .webhook-item {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    
    .webhook-item:hover { border-color: var(--accent); }
    
    .webhook-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      cursor: pointer;
    }
    
    .method {
      font-weight: 700;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 4px;
      min-width: 50px;
      text-align: center;
    }
    
    .method.post { background: #22c55e20; color: #22c55e; }
    .method.get { background: #3b82f620; color: #3b82f6; }
    .method.put { background: #f59e0b20; color: #f59e0b; }
    .method.delete { background: #ef444420; color: #ef4444; }
    .method.patch { background: #8b5cf620; color: #8b5cf6; }
    
    .webhook-path {
      flex: 1;
      font-family: monospace;
      font-size: 13px;
      color: var(--text2);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    
    .webhook-time {
      font-size: 11px;
      color: var(--text2);
    }
    
    .webhook-body {
      display: none;
      padding: 0 16px 16px;
      border-top: 1px solid var(--border);
    }
    
    .webhook-body.open { display: block; }
    
    .json-viewer {
      background: var(--bg);
      border-radius: 8px;
      padding: 16px;
      margin-top: 12px;
      font-family: monospace;
      font-size: 12px;
      overflow-x: auto;
      max-height: 300px;
      overflow-y: auto;
    }
    
    .json-key { color: #f472b6; }
    .json-string { color: #a5d6a7; }
    .json-number { color: #ffcc80; }
    .json-boolean { color: #81d4fa; }
    .json-null { color: #ef5350; }
    
    .webhook-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text2);
    }
    
    .empty-state svg {
      width: 80px;
      height: 80px;
      margin-bottom: 20px;
      opacity: 0.3;
    }
    
    .auth-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      display: none;
    }
    
    .auth-modal.open { display: flex; }
    
    .auth-box {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 30px;
      width: 100%;
      max-width: 400px;
    }
    
    .auth-box h2 {
      margin-bottom: 20px;
      text-align: center;
    }
    
    .auth-box form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    
    .auth-box input { width: 100%; }
    
    .auth-box .error {
      color: var(--error);
      font-size: 13px;
      text-align: center;
    }
    
    .auth-box .switch {
      text-align: center;
      margin-top: 15px;
      font-size: 13px;
      color: var(--text2);
    }
    
    .auth-box .switch a {
      color: var(--accent2);
      cursor: pointer;
    }
    
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      display: none;
    }
    
    .modal.open { display: flex; }
    
    .modal-box {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 30px;
      width: 100%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
    }
    
    .modal-box h2 {
      margin-bottom: 20px;
    }
    
    .modal-box .form-group {
      margin-bottom: 15px;
    }
    
    .modal-box label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: var(--text2);
    }
    
    .modal-box input, .modal-box textarea, .modal-box select {
      width: 100%;
    }
    
    .modal-box .form-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 20px;
    }
    
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--bg2);
      border: 1px solid var(--border);
      padding: 14px 20px;
      border-radius: 10px;
      z-index: 2000;
      animation: slideIn 0.3s ease;
    }
    
    .toast.success { border-color: var(--success); }
    .toast.error { border-color: var(--error); }
    
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    
    .search-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    
    .search-bar input { flex: 1; }
    
    .live-indicator {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--success);
    }
    
    .live-indicator::before {
      content: '';
      width: 8px;
      height: 8px;
      background: var(--success);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }
    
    @media (max-width: 768px) {
      .grid-2 { grid-template-columns: 1fr; }
      .header-content { flex-direction: column; }
      .tabs { overflow-x: auto; }
    }
  </style>
</head>
<body>
  <header>
    <div class="container header-content">
      <h1>OpenHook 🪝 <span>- Webhook Debugger</span></h1>
      <div class="auth-section">
        <span id="userEmail" style="color: var(--text2); font-size: 14px;"></span>
        <button id="authBtn" class="secondary">Login / Register</button>
        <button id="logoutBtn" class="secondary" style="display:none;">Logout</button>
      </div>
    </div>
  </header>
  
  <main class="container">
    <div class="endpoint-box">
      <div class="label">Your Webhook Endpoint</div>
      <div class="url" id="endpointUrl">Loading...</div>
      <div class="actions">
        <button class="secondary small" onclick="copyEndpoint()">📋 Copy</button>
        <button class="secondary small" onclick="refreshEndpoint()">🔄 Refresh</button>
        <button class="secondary small" onclick="createNewEndpoint()">➕ New</button>
        <button class="secondary small" onclick="openExport()">📥 Export</button>
      </div>
    </div>
    
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search webhooks by body, headers, or method..." onkeyup="searchWebhooks(event)">
      <button onclick="loadWebhooks()">🔍 Search</button>
    </div>
    
    <div class="tabs">
      <button class="tab active" onclick="showTab('all')">All Requests</button>
      <button class="tab" onclick="showTab('post')">POST</button>
      <button class="tab" onclick="showTab('get')">GET</button>
      <button class="tab" onclick="showTab('put')">PUT</button>
      <button class="tab" onclick="showTab('delete')">DELETE</button>
    </div>
    
    <div id="webhookList" class="webhook-list">
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
          <path d="M12 8v4M12 16h.01"/>
        </svg>
        <p>No webhooks captured yet</p>
        <p style="font-size: 13px; margin-top: 8px;">Send a POST request to your endpoint to see it here</p>
      </div>
    </div>
  </main>
  
  <!-- Auth Modal -->
  <div class="auth-modal" id="authModal">
    <div class="auth-box">
      <h2 id="authTitle">Login</h2>
      <form id="authForm" onsubmit="handleAuth(event)">
        <input type="email" id="authEmail" placeholder="Email" required>
        <input type="password" id="authPassword" placeholder="Password" required>
        <div class="error" id="authError"></div>
        <button type="submit" id="authSubmit">Login</button>
      </form>
      <div class="switch">
        <span id="authSwitch">Don't have an account? </span>
        <a onclick="toggleAuthMode()" id="authToggle">Register</a>
      </div>
    </div>
  </div>
  
  <!-- Replay Modal -->
  <div class="modal" id="replayModal">
    <div class="modal-box">
      <h2>🔄 Replay Webhook</h2>
      <div class="form-group">
        <label>Target URL</label>
        <input type="url" id="replayUrl" placeholder="https://example.com/webhook" required>
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label>Method Override</label>
          <select id="replayMethod">
            <option value="">Use Original</option>
            <option value="POST">POST</option>
            <option value="GET">GET</option>
            <option value="PUT">PUT</option>
            <option value="DELETE">DELETE</option>
          </select>
        </div>
        <div class="form-group">
          <label>SSL Verification</label>
          <select id="replaySsl">
            <option value="true">Enabled</option>
            <option value="false">Disabled</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Custom Headers (JSON)</label>
        <textarea id="replayHeaders" rows="3" placeholder='{"Authorization": "Bearer token"}'></textarea>
      </div>
      <div id="replayResult" style="display:none; margin-top:15px;">
        <h3 style="font-size:14px; margin-bottom:10px;">Response</h3>
        <div class="json-viewer" id="replayResponse"></div>
      </div>
      <div class="form-actions">
        <button class="secondary" onclick="closeReplay()">Close</button>
        <button onclick="sendReplay()">Send</button>
      </div>
    </div>
  </div>
  
  <!-- Export Modal -->
  <div class="modal" id="exportModal">
    <div class="modal-box">
      <h2>📥 Export Webhooks</h2>
      <p style="color: var(--text2); margin-bottom: 20px;">
        Download all webhooks for <strong id="exportEndpoint"></strong> as JSON.
      </p>
      <div class="form-actions">
        <button class="secondary" onclick="closeExport()">Cancel</button>
        <button onclick="doExport()">Download</button>
      </div>
    </div>
  </div>

  <script>
    // State
    let currentEndpoint = null;
    let webhooks = [];
    let isLoggedIn = false;
    let authMode = 'login';
    let currentWebhookId = null;
    let eventSource = null;
    let filterMethod = 'all';
    
    // Init
    document.addEventListener('DOMContentLoaded', () => {
      checkAuth();
      loadWebhooks();
      setInterval(loadWebhooks, 5000);
    });
    
    // Auth
    async function checkAuth() {
      try {
        const res = await fetch('/api/auth/me');
        const data = await res.json();
        if (data.user) {
          isLoggedIn = true;
          currentEndpoint = data.user.endpoint;
          document.getElementById('userEmail').textContent = data.user.email;
          document.getElementById('authBtn').style.display = 'none';
          document.getElementById('logoutBtn').style.display = 'block';
          updateEndpointDisplay();
          connectSSE();
        } else {
          loadPublicEndpoint();
        }
      } catch (e) {
        loadPublicEndpoint();
      }
    }
    
    function loadPublicEndpoint() {
      // For anonymous users, create a random endpoint
      currentEndpoint = 'hook_' + Math.random().toString(36).substring(2, 10);
      updateEndpointDisplay();
    }
    
    async function loadWebhooks() {
      if (!currentEndpoint) return;
      
      try {
        const search = document.getElementById('searchInput').value;
        const url = `/api/hooks/${currentEndpoint}${search ? '?search=' + encodeURIComponent(search) : ''}`;
        const res = await fetch(url);
        webhooks = await res.json();
        renderWebhooks();
      } catch (e) {
        console.error('Failed to load webhooks:', e);
      }
    }
    
    function updateEndpointDisplay() {
      const url = `https://openhook.vercel.app/api/hook/${currentEndpoint}`;
      document.getElementById('endpointUrl').textContent = url;
    }
    
    function connectSSE() {
      if (eventSource) eventSource.close();
      if (!currentEndpoint || isLoggedIn) return;
      
      eventSource = new EventSource(`/api/sse/${currentEndpoint}`);
      eventSource.onmessage = (event) => {
        const data = JSON.parse(event.data);
        if (data.type === 'webhook') {
          webhooks.unshift(data.webhook);
          renderWebhooks();
          showToast('New webhook received!', 'success');
        }
      };
      eventSource.onerror = () => {
        setTimeout(connectSSE, 5000);
      };
    }
    
    function renderWebhooks() {
      const container = document.getElementById('webhookList');
      
      const filtered = filterMethod === 'all' 
        ? webhooks 
        : webhooks.filter(w => w.method.toLowerCase() === filterMethod);
      
      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
              <path d="M12 8v4M12 16h.01"/>
            </svg>
            <p>No ${filterMethod === 'all' ? '' : filterMethod.toUpperCase() + ' '}webhooks found</p>
          </div>
        `;
        return;
      }
      
      container.innerHTML = filtered.map(w => `
        <div class="webhook-item">
          <div class="webhook-header" onclick="toggleBody('${w.id}')">
            <span class="method ${w.method.toLowerCase()}">${w.method}</span>
            <span class="webhook-path">${w.path}</span>
            <span class="webhook-time">${formatTime(w.time)}</span>
          </div>
          <div class="webhook-body" id="body-${w.id}">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
              <strong style="font-size:12px; color:var(--text2);">ID: ${w.id}</strong>
              <div class="webhook-actions" style="border:none; padding:0; margin:0;">
                <button class="small secondary" onclick="event.stopPropagation(); openReplay('${w.id}')">🔄 Replay</button>
                <button class="small danger" onclick="event.stopPropagation(); deleteWebhook('${w.id}')">🗑️ Delete</button>
              </div>
            </div>
            
            <div class="form-group">
              <label style="font-size:11px; color:var(--text2); margin-bottom:4px;">Headers</label>
              <div class="json-viewer">${syntaxHighlight(w.headers)}</div>
            </div>
            
            ${Object.keys(w.body || {}).length > 0 ? `
              <div class="form-group">
                <label style="font-size:11px; color:var(--text2); margin-bottom:4px;">Body</label>
                <div class="json-viewer">${syntaxHighlight(w.body)}</div>
              </div>
            ` : ''}
            
            ${Object.keys(w.query || {}).length > 0 ? `
              <div class="form-group">
                <label style="font-size:11px; color:var(--text2); margin-bottom:4px;">Query Params</label>
                <div class="json-viewer">${syntaxHighlight(w.query)}</div>
              </div>
            ` : ''}
          </div>
        </div>
      `).join('');
    }
    
    function toggleBody(id) {
      const body = document.getElementById('body-' + id);
      body.classList.toggle('open');
    }
    
    function showTab(method) {
      filterMethod = method;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      renderWebhooks();
    }
    
    function searchWebhooks(event) {
      if (event.key === 'Enter') {
        loadWebhooks();
      }
    }
    
    async function copyEndpoint() {
      const url = document.getElementById('endpointUrl').textContent;
      await navigator.clipboard.writeText(url);
      showToast('Copied to clipboard!', 'success');
    }
    
    async function refreshEndpoint() {
      loadWebhooks();
      showToast('Webhooks refreshed', 'success');
    }
    
    async function createNewEndpoint() {
      if (!isLoggedIn) {
        showToast('Login required to create endpoints', 'error');
        openAuth();
        return;
      }
      
      try {
        const res = await fetch('/api/endpoints', { method: 'POST' });
        const data = await res.json();
        if (data.endpoint) {
          currentEndpoint = data.endpoint;
          updateEndpointDisplay();
          connectSSE();
          loadWebhooks();
          showToast('New endpoint created!', 'success');
        }
      } catch (e) {
        showToast('Failed to create endpoint', 'error');
      }
    }
    
    function openExport() {
      document.getElementById('exportEndpoint').textContent = currentEndpoint;
      document.getElementById('exportModal').classList.add('open');
    }
    
    function closeExport() {
      document.getElementById('exportModal').classList.remove('open');
    }
    
    function doExport() {
      window.location.href = `/api/export/${currentEndpoint}`;
      closeExport();
    }
    
    function openReplay(webhookId) {
      currentWebhookId = webhookId;
      document.getElementById('replayUrl').value = '';
      document.getElementById('replayMethod').value = '';
      document.getElementById('replayHeaders').value = '';
      document.getElementById('replayResult').style.display = 'none';
      document.getElementById('replayModal').classList.add('open');
    }
    
    function closeReplay() {
      document.getElementById('replayModal').classList.remove('open');
    }
    
    async function sendReplay() {
      const url = document.getElementById('replayUrl').value;
      if (!url) return;
      
      const method = document.getElementById('replayMethod').value;
      const sslVerify = document.getElementById('replaySsl').value === 'true';
      let headers = {};
      
      try {
        if (document.getElementById('replayHeaders').value) {
          headers = JSON.parse(document.getElementById('replayHeaders').value);
        }
      } catch (e) {
        showToast('Invalid headers JSON', 'error');
        return;
      }
      
      try {
        const res = await fetch(`/api/replay/${currentWebhookId}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url, method, headers, sslVerify })
        });
        
        const data = await res.json();
        
        document.getElementById('replayResult').style.display = 'block';
        document.getElementById('replayResponse').innerHTML = `
          <div style="margin-bottom:10px;">
            <span style="color: ${data.success ? 'var(--success)' : 'var(--error)'};">${data.status} ${data.statusText}</span>
          </div>
          ${syntaxHighlight(data)}
        `;
        
        showToast(data.success ? 'Replay successful!' : 'Replay returned error', data.success ? 'success' : 'error');
      } catch (e) {
        showToast('Replay failed: ' + e.message, 'error');
      }
    }
    
    async function deleteWebhook(webhookId) {
      if (!confirm('Delete this webhook?')) return;
      
      try {
        await fetch(`/api/webhooks/${webhookId}`, { method: 'DELETE' });
        webhooks = webhooks.filter(w => w.id !== webhookId);
        renderWebhooks();
        showToast('Webhook deleted', 'success');
      } catch (e) {
        showToast('Delete failed', 'error');
      }
    }
    
    // Auth
    function openAuth() {
      document.getElementById('authModal').classList.add('open');
    }
    
    function closeAuth() {
      document.getElementById('authModal').classList.remove('open');
    }
    
    function toggleAuthMode() {
      authMode = authMode === 'login' ? 'register' : 'login';
      document.getElementById('authTitle').textContent = authMode === 'login' ? 'Login' : 'Register';
      document.getElementById('authSubmit').textContent = authMode === 'login' ? 'Login' : 'Register';
      document.getElementById('authSwitch').textContent = authMode === 'login' ? "Don't have an account? " : 'Already have an account? ';
      document.getElementById('authToggle').textContent = authMode === 'login' ? 'Register' : 'Login';
      document.getElementById('authError').textContent = '';
    }
    
    async function handleAuth(e) {
      e.preventDefault();
      const email = document.getElementById('authEmail').value;
      const password = document.getElementById('authPassword').value;
      const errorEl = document.getElementById('authError');
      
      try {
        const res = await fetch(`/api/auth/${authMode}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        
        const data = await res.json();
        
        if (!res.ok) {
          errorEl.textContent = data.error || 'Auth failed';
          return;
        }
        
        // Save token
        localStorage.setItem('token', data.token);
        
        // Update UI
        isLoggedIn = true;
        currentEndpoint = data.user.endpoint;
        document.getElementById('userEmail').textContent = data.user.email;
        document.getElementById('authBtn').style.display = 'none';
        document.getElementById('logoutBtn').style.display = 'block';
        
        updateEndpointDisplay();
        connectSSE();
        loadWebhooks();
        closeAuth();
        showToast(authMode === 'login' ? 'Logged in!' : 'Registered!', 'success');
      } catch (e) {
        errorEl.textContent = 'Auth failed: ' + e.message;
      }
    }
    
    function logout() {
      localStorage.removeItem('token');
      isLoggedIn = false;
      currentEndpoint = null;
      document.getElementById('userEmail').textContent = '';
      document.getElementById('authBtn').style.display = 'block';
      document.getElementById('logoutBtn').style.display = 'none';
      if (eventSource) eventSource.close();
      loadPublicEndpoint();
      loadWebhooks();
      showToast('Logged out', 'success');
    }
    
    // Utilities
    function formatTime(ts) {
      const d = new Date(ts);
      return d.toLocaleTimeString() + ' ' + d.toLocaleDateString();
    }
    
    function syntaxHighlight(obj) {
      if (typeof obj !== 'string') {
        obj = JSON.stringify(obj, null, 2);
      }
      return obj.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, (match) => {
        let cls = 'json-number';
        if (/^"/.test(match)) {
          cls = /:$/.test(match) ? 'json-key' : 'json-string';
        } else if (/true|false/.test(match)) {
          cls = 'json-boolean';
        } else if (/null/.test(match)) {
          cls = 'json-null';
        }
        return '<span class="' + cls + '">' + match + '</span>';
      });
    }
    
    function showToast(msg, type = 'success') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }
    
    // Event listeners
    document.getElementById('authBtn').addEventListener('click', openAuth);
    document.getElementById('logoutBtn').addEventListener('click', logout);
  </script>
</body>
</html>
